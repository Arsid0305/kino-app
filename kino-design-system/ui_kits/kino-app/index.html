<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>КИНО — UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="MovieCard.jsx"></script>
<script type="text/babel" src="FilterChip.jsx"></script>
<script type="text/babel" src="AuthPanel.jsx"></script>
<script type="text/babel" src="AiAdvisor.jsx"></script>
<script type="text/babel" src="WatchHistory.jsx"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: hsl(220 20% 6%);
    color: hsl(40 20% 92%);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: hsl(220 15% 18%); border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// ─── Filter Data ────────────────────────────────────────────────────────────
const TYPE_OPTIONS = [
  { value: 'movie', label: 'Фильм', icon: '🎬' },
  { value: 'series', label: 'Сериал', icon: '📺' },
  { value: 'mini', label: 'Мини-сериал', icon: '🎞️', subtitle: 'до 10 серий' },
];
const TIME_OPTIONS = [
  { value: 'morning', label: 'Утро', icon: '🌅' },
  { value: 'day', label: 'День', icon: '☀️' },
  { value: 'evening', label: 'Вечер', icon: '🌙' },
];
const GENRE_OPTIONS = [
  { value: 'action', label: 'Боевик', icon: '💪' },
  { value: 'comedy', label: 'Комедия', icon: '😂' },
  { value: 'drama', label: 'Драма', icon: '🎭' },
  { value: 'scifi', label: 'Фантастика', icon: '🚀' },
  { value: 'thriller', label: 'Триллер', icon: '🔪' },
  { value: 'horror', label: 'Ужасы', icon: '👻' },
];
const MOOD_OPTIONS = [
  { value: 'relax', label: 'Расслабиться', icon: '🛋️' },
  { value: 'inspire', label: 'Вдохновиться', icon: '✨' },
  { value: 'tension', label: 'Напряжение', icon: '😰' },
  { value: 'laugh', label: 'Смеяться', icon: '🤣' },
];
const COMPANY_OPTIONS = [
  { value: 'solo', label: 'Один', icon: '🎧' },
  { value: 'couple', label: 'С парой', icon: '👫' },
  { value: 'friends', label: 'С друзьями', icon: '👥' },
  { value: 'family', label: 'Семья', icon: '👨‍👩‍👧' },
];

// ─── Sample Data ─────────────────────────────────────────────────────────────
const SAMPLE_MOVIES = [
  {
    id: '1', titleRu: 'ИНТЕРСТЕЛЛАР', title: 'Interstellar', year: 2014,
    description: 'Команда исследователей путешествует через червоточину в поисках нового дома для человечества.',
    reasonToWatch: 'Вы любите масштабные научно-фантастические фильмы с глубоким эмоциональным зарядом.',
    genre: ['фантастика', 'драма'], mood: ['вдохновляющее'],
    duration: 169, director: 'Christopher Nolan', kpRating: 8.6,
  },
  {
    id: '2', titleRu: 'DREDD', title: 'Dredd', year: 2012,
    description: 'Судья Дредд и стажёр заперты в небоскрёбе, контролируемом бандой под руководством безжалостной Мамы.',
    reasonToWatch: 'Плотный экшен без лишнего, ровно 95 минут — идеально для вечера.',
    genre: ['боевик', 'фантастика'], mood: ['напряжённое'],
    duration: 95, director: 'Pete Travis', kpRating: 7.2,
  },
  {
    id: '3', titleRu: 'ЛОКК', title: 'Locke', year: 2013,
    description: 'Один мужчина. Один автомобиль. Одна ночь, которая изменит всё.',
    reasonToWatch: 'Если хочешь что-то тихое, но держит мёртвой хваткой.',
    genre: ['драма', 'триллер'], mood: ['напряжённое'],
    duration: 85, director: 'Steven Knight', kpRating: 7.5,
  },
];

const SAMPLE_WATCHED = [
  { id: 'w1', titleRu: 'ДЮНА', title: 'Dune', year: 2021, duration: 155, rating: 5, notes: 'Визуально потрясающе' },
  { id: 'w2', titleRu: 'МАТРИЦА', title: 'The Matrix', year: 1999, duration: 136, rating: 5, notes: '' },
  { id: 'w3', titleRu: 'ПАРАЗИТЫ', title: 'Parasite', year: 2019, duration: 132, rating: 4, notes: 'Неожиданный поворот' },
  { id: 'w4', titleRu: 'ДЖОКЕР', title: 'Joker', year: 2019, duration: 122, rating: 3, notes: '' },
];

// ─── Rating Modal ─────────────────────────────────────────────────────────────
const RatingModal = ({ movie, onSubmit, onClose }) => {
  const [rating, setRating] = React.useState(4);
  const [notes, setNotes] = React.useState('');
  const [hovered, setHovered] = React.useState(null);

  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 100, display: 'flex', alignItems: 'flex-end', justifyContent: 'center', background: 'rgba(0,0,0,0.6)', backdropFilter: 'blur(4px)' }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background: 'hsl(220 18% 10%)', border: '1px solid hsl(220 15% 18%)', borderRadius: '16px 16px 0 0', padding: 20, width: '100%', maxWidth: 448 }}>
        <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 20, letterSpacing: '0.04em', color: '#ece9e0', marginBottom: 4 }}>{movie.titleRu}</div>
        <div style={{ fontSize: 11, color: '#787e8a', marginBottom: 16 }}>Оцените фильм</div>

        <div style={{ display: 'flex', gap: 8, justifyContent: 'center', marginBottom: 16 }}>
          {[1,2,3,4,5].map(i => (
            <button key={i} onClick={() => setRating(i)}
              onMouseEnter={() => setHovered(i)} onMouseLeave={() => setHovered(null)}
              style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4, transition: 'transform 0.1s', transform: (hovered || rating) >= i ? 'scale(1.15)' : 'scale(1)' }}>
              <svg width="28" height="28" viewBox="0 0 24 24"
                fill={(hovered || rating) >= i ? 'hsl(38 90% 55%)' : 'none'}
                stroke="hsl(38 90% 55%)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
              </svg>
            </button>
          ))}
        </div>

        <textarea value={notes} onChange={e => setNotes(e.target.value)}
          placeholder="Заметки (необязательно)..."
          style={{ width: '100%', background: 'hsl(220 20% 6%)', border: '1px solid hsl(220 15% 18%)', borderRadius: 12, padding: '10px 12px', fontSize: 13, color: '#ece9e0', outline: 'none', resize: 'none', height: 72, fontFamily: 'Inter, sans-serif', marginBottom: 12 }} />

        <div style={{ display: 'flex', gap: 8 }}>
          <button onClick={onClose} style={{ flex: 1, padding: 12, borderRadius: 12, border: '1px solid hsl(220 15% 18%)', background: 'none', color: '#787e8a', fontSize: 14, cursor: 'pointer' }}>Отмена</button>
          <button onClick={() => onSubmit(rating, notes)}
            style={{ flex: 2, padding: 12, borderRadius: 12, border: 'none', background: 'hsl(38 90% 55%)', color: '#0d1117', fontFamily: "'Bebas Neue', sans-serif", fontSize: 18, letterSpacing: '0.04em', cursor: 'pointer' }}>
            СОХРАНИТЬ
          </button>
        </div>
      </div>
    </div>
  );
};

// ─── App ──────────────────────────────────────────────────────────────────────
const App = () => {
  const [tab, setTab] = React.useState('recommend');
  const [filters, setFilters] = React.useState({ type: null, time: null, genre: null, mood: null, company: null });
  const [recommendations, setRecommendations] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [ratingMovie, setRatingMovie] = React.useState(null);
  const [watched, setWatched] = React.useState(SAMPLE_WATCHED);
  const [watchlist, setWatchlist] = React.useState([]);
  const [dismissed, setDismissed] = React.useState([]);
  const [session, setSession] = React.useState(null);
  const [movieIdx, setMovieIdx] = React.useState(0);

  const updateFilter = key => val => setFilters(prev => ({ ...prev, [key]: prev[key] === val ? null : val }));
  const hasFilters = Object.values(filters).some(Boolean);

  const getMovie = () => {
    setLoading(true);
    setRecommendations([]);
    setTimeout(() => {
      const movie = SAMPLE_MOVIES[movieIdx % SAMPLE_MOVIES.length];
      setMovieIdx(i => i + 1);
      setRecommendations([movie]);
      setLoading(false);
    }, 800);
  };

  const handleRate = movie => {
    setWatchlist(prev => [movie, ...prev.filter(m => m.id !== movie.id)]);
    setRecommendations(prev => prev.filter(m => m.id !== movie.id));
    setRatingMovie(null);
  };

  const handleSkip = movie => {
    setDismissed(prev => [movie, ...prev]);
    setRecommendations(prev => prev.filter(m => m.id !== movie.id));
    if (recommendations.length <= 1) setTimeout(getMovie, 300);
  };

  const handleRatingSubmit = (rating, notes) => {
    if (!ratingMovie) return;
    const entry = { ...ratingMovie, rating, notes, watchedAt: new Date().toISOString() };
    setWatched(prev => [entry, ...prev.filter(m => m.id !== entry.id)]);
    setWatchlist(prev => prev.filter(m => m.id !== entry.id));
    setRecommendations(prev => prev.filter(m => m.id !== entry.id));
    setRatingMovie(null);
  };

  const navStyle = (active) => ({
    padding: '6px 12px', borderRadius: 10, fontSize: 11, fontWeight: 500, cursor: 'pointer',
    border: 'none', display: 'flex', alignItems: 'center', gap: 5, transition: 'all 0.15s',
    background: active ? 'hsl(220 18% 10%)' : 'transparent',
    color: active ? '#ece9e0' : '#787e8a',
    boxShadow: active ? '0 1px 4px rgba(0,0,0,0.3)' : 'none',
  });

  return (
    <div style={{ minHeight: '100vh', background: 'hsl(220 20% 6%)', paddingBottom: 80 }}>
      {/* Sticky Nav */}
      <div style={{ position: 'sticky', top: 0, zIndex: 40, background: 'hsl(220 18% 10% / 0.85)', backdropFilter: 'blur(20px)', borderBottom: '1px solid hsl(220 15% 18%)' }}>
        <div style={{ maxWidth: 448, margin: '0 auto', padding: '12px 16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{ width: 36, height: 36, borderRadius: 10, background: 'hsl(38 90% 55% / 0.15)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="hsl(38 90% 55%)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M4 11a9 9 0 0 1 9 9"></path><path d="M4 4a16 16 0 0 1 16 16"></path><circle cx="5" cy="19" r="1"></circle>
              </svg>
            </div>
            <div>
              <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 24, letterSpacing: '0.04em', color: '#ece9e0', lineHeight: 1 }}>КИНО</div>
              <div style={{ fontSize: 9, color: '#787e8a' }}>Глобальный AI подбор</div>
            </div>
          </div>
          <div style={{ display: 'flex', background: 'hsl(220 15% 16%)', borderRadius: 12, padding: 4, gap: 2 }}>
            <button onClick={() => setTab('recommend')} style={navStyle(tab === 'recommend')}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>
              Подбор
            </button>
            <button onClick={() => setTab('history')} style={navStyle(tab === 'history')}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M12 7v5l4 2"></path></svg>
              История
            </button>
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{ maxWidth: 448, margin: '0 auto', padding: '20px 16px', display: 'flex', flexDirection: 'column', gap: 22 }}>
        <AuthPanel
          session={session}
          syncStatus="Синхронизировано с Supabase"
          onSignOut={() => setSession(null)}
          onSendCode={async (email) => {
            await new Promise(r => setTimeout(r, 600));
            setSession({ email, id: '1' });
          }}
        />

        {tab === 'recommend' ? (
          <>
            <FilterSection title="Тип" options={TYPE_OPTIONS} selected={filters.type} onSelect={updateFilter('type')} />
            <FilterSection title="Время дня" options={TIME_OPTIONS} selected={filters.time} onSelect={updateFilter('time')} />
            <FilterSection title="Жанр" options={GENRE_OPTIONS} selected={filters.genre} onSelect={updateFilter('genre')} />
            <FilterSection title="Настроение" options={MOOD_OPTIONS} selected={filters.mood} onSelect={updateFilter('mood')} />
            <FilterSection title="Компания" options={COMPANY_OPTIONS} selected={filters.company} onSelect={updateFilter('company')} />

            {/* CTA */}
            <button onClick={getMovie} disabled={loading}
              style={{
                width: '100%', padding: '14px', borderRadius: 16, border: 'none', cursor: 'pointer',
                background: (hasFilters || session) ? 'hsl(38 90% 55%)' : 'hsl(220 15% 16%)',
                color: (hasFilters || session) ? '#0d1117' : '#787e8a',
                fontFamily: "'Bebas Neue', sans-serif", fontSize: 20, letterSpacing: '0.04em',
                boxShadow: (hasFilters || session) ? '0 0 30px -5px hsl(38 90% 55% / 0.25)' : 'none',
                opacity: loading ? 0.7 : 1, transition: 'all 0.2s',
              }}
              onMouseDown={e => !loading && (e.currentTarget.style.transform = 'scale(0.97)')}
              onMouseUp={e => e.currentTarget.style.transform = 'scale(1)'}
              onMouseLeave={e => e.currentTarget.style.transform = 'scale(1)'}>
              {loading ? 'ИЩУ ФИЛЬМ...' : 'ПОДОБРАТЬ ФИЛЬМ'}
            </button>

            {/* Movie cards */}
            {recommendations.map(movie => (
              <MovieCard key={movie.id} movie={movie}
                onRate={m => setRatingMovie(m)}
                onSkip={() => handleSkip(movie)} />
            ))}

            {/* Stats row */}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8 }}>
              {[
                { num: watchlist.length, label: 'Буду смотреть', dim: false },
                { num: watched.length, label: 'Просмотрено', dim: false, onClick: () => setTab('history') },
                { num: dismissed.length, label: 'Исключено', dim: true },
              ].map(({ num, label, dim, onClick }) => (
                <button key={label} onClick={onClick}
                  style={{ padding: '10px 8px', borderRadius: 12, background: 'hsl(220 15% 16% / 0.6)', border: '1px solid hsl(220 15% 18%)', cursor: 'pointer', textAlign: 'center', transition: 'border-color 0.15s' }}
                  onMouseEnter={e => e.currentTarget.style.borderColor = 'hsl(38 90% 55% / 0.4)'}
                  onMouseLeave={e => e.currentTarget.style.borderColor = 'hsl(220 15% 18%)'}>
                  <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 20, color: dim ? '#787e8a' : 'hsl(38 90% 55%)', lineHeight: 1 }}>{num}</div>
                  <div style={{ fontSize: 9, color: '#787e8a', marginTop: 3, lineHeight: 1.3 }}>{label}</div>
                </button>
              ))}
            </div>
          </>
        ) : (
          <WatchHistory watched={watched} onReRate={movie => setRatingMovie(movie)} />
        )}
      </div>

      {/* AI Advisor */}
      <AiAdvisor watchedMovies={watched} onAddToWatchlist={m => setWatchlist(prev => [m, ...prev])} />

      {/* Rating Modal */}
      {ratingMovie && (
        <RatingModal movie={ratingMovie}
          onSubmit={handleRatingSubmit}
          onClose={() => setRatingMovie(null)} />
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
