<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; padding: 16px; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .label { font-size: 9px; color: #787e8a; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }

  /* Primary CTA */
  .btn-primary {
    background: hsl(38 90% 55%); color: #0d1117;
    font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.04em;
    border: none; border-radius: 16px; padding: 12px 28px; cursor: pointer;
    box-shadow: 0 0 30px -5px hsl(38 90% 55% / 0.25);
  }
  /* Secondary */
  .btn-secondary {
    background: hsl(220 15% 16%); color: #d6d0c4;
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
    border: 1px solid #262d38; border-radius: 12px; padding: 10px 18px; cursor: pointer;
  }
  /* Outline */
  .btn-outline {
    background: transparent; color: #787e8a;
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
    border: 1px solid #262d38; border-radius: 12px; padding: 10px 18px; cursor: pointer;
  }
  /* Icon CTA */
  .btn-icon {
    background: hsl(38 90% 55%); color: #0d1117;
    border: none; border-radius: 12px; width: 40px; height: 40px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  /* Disabled */
  .btn-disabled {
    background: hsl(220 15% 16%); color: #787e8a;
    font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.04em;
    border: none; border-radius: 16px; padding: 12px 28px; opacity: 0.6; cursor: not-allowed;
  }
  /* FAB */
  .btn-fab {
    background: hsl(38 90% 55%); color: #0d1117;
    border: none; border-radius: 9999px; width: 52px; height: 52px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 30px -5px hsl(38 90% 55% / 0.3);
  }
  /* Text btn */
  .btn-text {
    background: none; border: none; color: #787e8a;
    font-size: 12px; cursor: pointer; padding: 4px;
    display: flex; align-items: center; gap: 4px;
  }
</style>
</head>
<body>
  <div>
    <div class="label">Primary CTA</div>
    <div class="row">
      <button class="btn-primary">ПОДОБРАТЬ ФИЛЬМ</button>
      <button class="btn-disabled">ПОДОБРАТЬ ФИЛЬМ</button>
    </div>
  </div>
  <div>
    <div class="label">Secondary / Outline</div>
    <div class="row">
      <button class="btn-secondary">Смотрю!</button>
      <button class="btn-outline">Другой</button>
      <button class="btn-outline">Где смотреть</button>
    </div>
  </div>
  <div>
    <div class="label">Icon / FAB</div>
    <div class="row">
      <button class="btn-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
      <button class="btn-fab">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"></path><rect width="16" height="12" x="4" y="8" rx="2"></rect><path d="M2 14h2M20 14h2M15 13v2M9 13v2"></path></svg>
      </button>
      <button class="btn-text">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        Выйти
      </button>
    </div>
  </div>
</body>
</html>
