<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; padding: 16px; font-family: 'Inter', sans-serif; }
  .panel {
    background: hsl(220 15% 16% / 0.4); border: 1px solid #262d38;
    border-radius: 16px; padding: 14px; max-width: 360px;
  }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .header-left { display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 500; color: #ece9e0; }
  .cloud-icon { color: hsl(38 90% 55%); }
  .signout { font-size: 11px; color: #787e8a; display: flex; align-items: center; gap: 3px; }
  .desc { font-size: 11px; color: #787e8a; margin-bottom: 10px; line-height: 1.4; }
  .google-btn {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 9px;
    border-radius: 12px; border: 1px solid #262d38; background: hsl(220 20% 6%);
    padding: 10px 16px; font-size: 13px; font-weight: 500; color: #ece9e0; cursor: pointer; margin-bottom: 10px;
  }
  .divider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .divider-line { flex: 1; height: 1px; background: #262d38; }
  .divider-text { font-size: 10px; color: #787e8a; white-space: nowrap; }
  .input-row { display: flex; gap: 7px; }
  .input {
    flex: 1; background: hsl(220 20% 6%); border: 1px solid #262d38; border-radius: 12px;
    padding: 9px 12px; font-size: 13px; color: #ece9e0; outline: none;
  }
  .btn-send { padding: 9px 16px; border-radius: 12px; background: hsl(38 90% 55%); color: #0d1117; font-size: 13px; font-weight: 500; border: none; cursor: pointer; white-space: nowrap; }
  .hint { font-size: 10px; color: #787e8a; margin-top: 8px; }
  svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
  <div class="panel">
    <div class="header">
      <div class="header-left">
        <svg class="cloud-icon" style="stroke:hsl(38 90% 55%)"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path></svg>
        Войдите, чтобы синхронизировать базу
      </div>
    </div>
    <div class="desc">История оценок и watchlist будут храниться в Supabase и подтягиваться на любом устройстве после входа.</div>
    <button class="google-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style="width:18px;height:18px;stroke:none">
        <path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58Z" fill="#EA4335"/>
      </svg>
      Войти через Google
    </button>
    <div class="divider-row">
      <div class="divider-line"></div>
      <span class="divider-text">или по коду на email</span>
      <div class="divider-line"></div>
    </div>
    <div class="input-row">
      <input class="input" placeholder="you@example.com" type="email">
      <button class="btn-send">Войти</button>
    </div>
    <div class="hint">Пришлём код на email — вводишь его здесь, никаких браузеров.</div>
  </div>
</body>
</html>
