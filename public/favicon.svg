<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0f1218"/>
  <!-- Clapper strip (top) -->
  <rect x="5" y="8" width="22" height="5" rx="1.5" fill="#f3a825"/>
  <!-- Diagonal stripes on strip -->
  <line x1="10" y1="8" x2="8"  y2="13" stroke="#0f1218" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="15" y1="8" x2="13" y2="13" stroke="#0f1218" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="20" y1="8" x2="18" y2="13" stroke="#0f1218" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Main board body -->
  <rect x="5" y="14" width="22" height="11" rx="1.5" fill="#f3a825"/>
  <!-- Lens circle on board -->
  <circle cx="16" cy="19.5" r="3.5" fill="#0f1218"/>
  <circle cx="16" cy="19.5" r="2" fill="#f3a825" opacity="0.5"/>
</svg>
